<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <title>Admin Panel - Online Mob Hub</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; padding: 30px; }
        h1 { color: #6c63ff; text-align: center; }
        .section { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #6c63ff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; background: #2ecc71; color: white; }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<!-- Orders Section -->
<div class="section">
    <h2>New Customer Orders</h2>
    <table id="ordersTable">
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Items Ordered</th>
                <th>Total Price</th>
            </tr>
        </thead>
        <tbody id="ordersBody">
            <!-- Data yahan load hoga -->
        </tbody>
    </table>
</div>

<!-- Reviews Section -->
<div class="section">
    <h2>Customer Reviews & Feedback</h2>
    <table id="reviewsTable">
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Review/Comment</th>
            </tr>
        </thead>
        <tbody id="reviewsBody">
            <!-- Reviews yahan load honge -->
        </tbody>
    </table>
</div>

<script>
// Aapki Supabase Details
const supabaseUrl = 'https://cxyxbwsosroeipdjyuuc.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4eXhid3Nvc3JvZWlwZGp5dXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDcxMzQsImV4cCI6MjA5MzE4MzEzNH0.8lI73RmCGGU3jQsiJxnyCMOe1NSaLWqvO3_1FBRZImM';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

// Data load karne ka function
async function loadAdminData() {
    // 1. Orders Fetch Karein
    const { data: orders, error: orderErr } = await _supabase.from('orders').select('*');
    if (orders) {
        const oBody = document.getElementById('ordersBody');
        oBody.innerHTML = orders.map(o => `
            <tr>
                <td>${o.customer_name}</td>
                <td>${o.phone}</td>
                <td>${o.address}</td>
                <td>${o.items}</td>
                <td>PKR ${o.total}</td>
            </tr>
        `).join('');
    }

    // 2. Reviews Fetch Karein[cite: 2]
    const { data: reviews, error: revErr } = await _supabase.from('reviews').select('*');
    if (reviews) {
        const rBody = document.getElementById('reviewsBody');
        rBody.innerHTML = reviews.map(r => `
            <tr>
                <td>${r.product_name}</td>
                <td>${r.comment}</td>
            </tr>
        `).join('');
    }
}

// Page load hotay hi data le aao
loadAdminData();
</script>
</body>
</html>
