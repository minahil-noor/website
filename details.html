<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product Detail | Online Mob Hub</title>
    <style>
        :root { --main-blue: #007bff; --hover-blue: #0056b3; --bg: #080808; --card: #151515; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; line-height: 1.6; }

        .container { max-width: 1200px; margin: 50px auto; padding: 20px; display: flex; flex-wrap: wrap; gap: 40px; }

        /* Product Image */
        .image-container { flex: 1; min-width: 300px; background: #fff; border-radius: 20px; display: flex; justify-content: center; align-items: center; padding: 30px; min-height: 400px; }
        .image-container img { max-width: 100%; height: auto; border-radius: 10px; transition: 0.3s; }
        .image-container img:hover { transform: scale(1.05); }

        /* Content */
        .details-container { flex: 1; min-width: 300px; }
        h1 { font-size: 32px; margin-bottom: 10px; color: var(--main-blue); }
        .price { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        .description-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        .pros { list-style: none; margin-top: 15px; }
        .pros li { margin-bottom: 8px; color: #ccc; font-size: 14px; }
        .pros li::before { content: '🚀'; margin-right: 10px; }

        /* Responsive Buttons Logic */
        .action-btns { 
            display: flex; 
            flex-direction: column; /* Mobile: Buttons stacked */
            gap: 15px; 
            margin-top: 30px; 
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }

        .btn-add { background: transparent; border: 2px solid var(--main-blue); color: var(--main-blue); }
        .btn-add:hover { background: var(--main-blue); color: #fff; }
        .btn-buy { background: var(--main-blue); color: #fff; }
        .btn-buy:hover { background: var(--hover-blue); transform: translateY(-2px); }

        /* Review Section */
        .review-section { max-width: 1200px; margin: 40px auto; padding: 20px; background: var(--card); border-radius: 20px; }
        .review-card { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--main-blue); }
        textarea { width: 100%; padding: 15px; border-radius: 10px; background: #000; color: #fff; border: 1px solid #444; margin: 15px 0; min-height: 100px; }

        /* Desktop Adjustment */
        @media (min-width: 768px) {
            .action-btns { flex-direction: row; } /* Side by side on desktop */
            .btn { width: 50%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-container" id="displayImg"></div>
    
    <div class="details-container">
        <h1 id="displayName">Product Name</h1>
        <div class="price" id="displayPrice">PKR 0</div>
        
        <div class="description-box">
            <h3>Why Online Mob Hub?</h3>
            <p>Premium quality assured with official warranty and express delivery across Pakistan.</p>
            <ul class="pros">
                <li>100% Authentic Product</li>
                <li>Secure Packaging</li>
                <li>7-Day Replacement Policy</li>
            </ul>
        </div>

        <div class="action-btns">
            <button class="btn btn-add" onclick="addToCart(false)">Add to Cart</button>
            <button class="btn btn-buy" onclick="addToCart(true)">Checkout Now</button>
        </div>
    </div>
</div>

<div class="review-section">
    <h2>Customer Reviews</h2>
    <div id="reviewsContainer" style="margin-top:20px; color: #bbb;">Loading reviews...</div>
    <textarea id="reviewText" placeholder="Write your experience..."></textarea>
    <button class="btn btn-buy" style="width: auto; padding: 12px 30px;" onclick="submitReview()">Post Review</button>
</div>

<script>
    const supabaseUrl = 'https://cxyxbwsosroeipdjyuuc.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4eXhid3Nvc3JvZWlwZGp5dXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MDcxMzQsImV4cCI6MjA5MzE4MzEzNH0.8lI73RmCGGU3jQsiJxnyCMOe1NSaLWqvO3_1FBRZImM';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Get selected product from LocalStorage
    const product = JSON.parse(localStorage.getItem("selectedItem"));

    if (product) {
        document.getElementById('displayName').innerText = product.name;
        document.getElementById('displayPrice').innerText = "PKR " + product.price.toLocaleString();
        document.getElementById('displayImg').innerHTML = `<img src="${product.img}" alt="${product.name}">`;
        loadReviews();
    } else {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Product not found. Please go back.</h2>";
    }

    // Logic for Cart and Checkout
    function addToCart(goToCheckout) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        
        // Check if item already exists to avoid duplicates
        const existingItem = cart.find(item => item.name === product.name);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            product.quantity = 1;
            cart.push(product);
        }

        localStorage.setItem("cart", JSON.stringify(cart));

        if (goToCheckout) {
            window.location.href = "index.html#cart"; // Redirect to checkout/cart section
        } else {
            alert("Item added to cart successfully!");
        }
    }

    // Supabase Reviews Logic
    async function loadReviews() {
        const { data, error } = await _supabase.from('reviews').select('*').eq('product_name', product.name);
        const container = document.getElementById('reviewsContainer');
        
        if (data && data.length > 0) {
            container.innerHTML = data.map(r => `
                <div class="review-card">
                    <small>Verified Buyer</small>
                    <p>"${r.comment}"</p>
                </div>
            `).join('');
        } else {
            container.innerHTML = "No reviews yet. Be the first to share your thoughts!";
        }
    }

    async function submitReview() {
        const msg = document.getElementById('reviewText').value;
        if(!msg) return alert("Please write something first.");

        const { error } = await _supabase.from('reviews').insert([{ product_name: product.name, comment: msg }]);
        
        if(!error) {
            alert("Review posted!");
            location.reload();
        } else {
            alert("Error posting review. Try again.");
        }
    }
</script>

</body>
</html>
